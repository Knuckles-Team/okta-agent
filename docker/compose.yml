services:
  okta-agent:
    build: .
    environment:
      - OKTA_ORG_URL
      - OKTA_API_TOKEN
      - OKTA_CLIENT_ID
      - OKTA_PRIVATE_KEY
      - OKTA_SCOPES
      - OKTA_ALLOW_DESTRUCTIVE
      - TRANSPORT=streamable-http
      - HOST=0.0.0.0
      - PORT=8000
    ports:
      - "8000:8000"
