[bumpversion]
current_version = 0.5.0
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file:docker/Dockerfile]
search = okta-agent[all]>={current_version}
replace = okta-agent[all]>={new_version}

[bumpversion:file:okta_agent/__init__.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:okta_agent/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:okta_agent/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:a2a.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"
